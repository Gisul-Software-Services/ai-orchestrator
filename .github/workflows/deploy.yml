name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/api_gateway/Dockerfile
          push: true
          tags: gisul/backend-api:latest
          provenance: false

      - name: Build and push model-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./model-service/Dockerfile
          push: true
          tags: gisul/model-service:latest
          provenance: false

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: gisul/model-frontend:latest
          provenance: false

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inject env files
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend/api_gateway/.env
          echo "${{ secrets.MODEL_ENV }}" > model-service/.env
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/web/.env.local

      - name: Deploy containers
        run: |
          cd $GITHUB_WORKSPACE
          docker-compose down --remove-orphans || true

          pull_with_retry () {
            image="$1"
            n=0
            until [ $n -ge 5 ]
            do
              docker pull "$image" && return 0
              n=$((n+1))
              echo "Pull failed for $image (attempt $n/5). Retrying in 10s..."
              sleep 10
            done
            return 1
          }

          pull_with_retry gisul/backend-api:latest
          pull_with_retry gisul/model-service:latest
          pull_with_retry gisul/model-frontend:latest

          docker-compose up -d --remove-orphans
          docker-compose ps
name: Deploy

on:
  push:
    branches:
      - dev
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DOCKER_CONFIG: ${{ runner.temp }}/.docker
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker config (no credential helpers)
        run: |
          mkdir -p "$DOCKER_CONFIG"
          cat > "$DOCKER_CONFIG/config.json" <<'EOF'
          {
            "auths": {}
          }
          EOF

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inject env files
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend/api_gateway/.env
          echo "${{ secrets.MODEL_ENV }}" > model-service/.env
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/web/.env.local
          echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" > .env
          echo "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}" >> .env

      - name: Deploy containers
        run: |
          cd $GITHUB_WORKSPACE

          docker compose down --remove-orphans || true

          pull_with_retry () {
            image="$1"
            n=0
            until [ $n -ge 5 ]
            do
              docker pull "$image" && return 0
              n=$((n+1))
              echo "Pull failed for $image (attempt $n/5). Retrying in 10s..."
              sleep 10
            done
            return 1
          }

          pull_with_retry gisul/backend-api:latest
          pull_with_retry gisul/model-service:latest
          pull_with_retry gisul/model-frontend:latest

          docker compose up -d --remove-orphans
          docker compose ps
name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # ci: trigger rebuild

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space before Docker build
        run: |
          # Free GitHub-hosted runner disk (torch/vLLM + CUDA wheels are huge)
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af || true
          docker builder prune -af || true

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/gateway
          file: ./backend/gateway/Dockerfile
          push: true
          tags: |
            gisul/backend-api:latest
            gisul/backend-api:${{ env.IMAGE_TAG }}
          provenance: false

      - name: Build and push model-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./model-service/Dockerfile
          no-cache: true
          pull: true
          push: true
          tags: |
            gisul/model-service:latest
            gisul/model-service:${{ env.IMAGE_TAG }}
          provenance: false

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: |
            gisul/model-frontend:latest
            gisul/model-frontend:${{ env.IMAGE_TAG }}
          provenance: false

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      DOCKER_CONFIG: /tmp/.docker-ci
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Prepare Docker config (no credential helpers)
        run: |
          mkdir -p "$DOCKER_CONFIG"
          cat > "$DOCKER_CONFIG/config.json" <<'EOF'
          {
            "auths": {}
          }
          EOF

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inject env files
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend/gateway/.env
          echo "${{ secrets.MODEL_ENV }}" > model-service/.env
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/web/.env.local
          echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" > .env
          echo "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}" >> .env
          echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

      - name: Deploy containers
        run: |
          cd $GITHUB_WORKSPACE

          docker compose down --remove-orphans || true

          pull_with_retry () {
            image="$1"
            n=0
            until [ $n -ge 5 ]
            do
              docker pull "$image" && return 0
              n=$((n+1))
              echo "Pull failed for $image (attempt $n/5). Retrying in 10s..."
              sleep 10
            done
            return 1
          }

          pull_with_retry gisul/backend-api:${IMAGE_TAG}
          pull_with_retry gisul/model-service:${IMAGE_TAG}
          pull_with_retry gisul/model-frontend:${IMAGE_TAG}

          docker compose up -d --remove-orphans
          docker compose ps

name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/api_gateway/Dockerfile
          push: true
          tags: gisul/backend-api:latest

      - name: Build and push model-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./model-service/Dockerfile
          push: true
          tags: gisul/model-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: gisul/model-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      # Isolate Docker auth config for this job.
      # On some self-hosted/WSL setups Docker is configured to use a credential helper
      # that may not be available in the runner environment, causing:
      # "error getting credentials - err: exit status 1".
      DOCKER_CONFIG: ${{ runner.temp }}/.docker

    steps:
      - uses: actions/checkout@v4

      - name: Prepare docker config dir
        run: |
          mkdir -p "$DOCKER_CONFIG"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inject env files
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > backend/api_gateway/.env
          echo "${{ secrets.MODEL_ENV }}" > model-service/.env
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/web/.env.local

      - name: Deploy containers
        run: |
          cd $GITHUB_WORKSPACE

          docker compose down --remove-orphans || true

          docker pull gisul/backend-api:latest
          docker pull gisul/model-service:latest
          docker pull gisul/model-frontend:latest

          # Images are already pulled above; avoid an extra pull during `compose up`.
          # This prevents Docker from attempting to fetch credentials via a failing
          # credential helper (seen in the logs).
          docker compose up -d --remove-orphans --pull never

          docker compose ps
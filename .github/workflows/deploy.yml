name: Build and Deploy

on:
  push:
    branches:
      - dev
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/api_gateway/Dockerfile
          push: true
          tags: gisul/backend-api:latest

      - name: Build and push model-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./model-service/Dockerfile
          push: true
          tags: gisul/model-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web
          file: ./frontend/web/Dockerfile
          push: true
          tags: gisul/model-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy containers
        run: |
          cd $GITHUB_WORKSPACE

          docker compose down --remove-orphans || true

          docker pull gisul/backend-api:latest
          docker pull gisul/model-service:latest
          docker pull gisul/model-frontend:latest

          docker compose up -d --remove-orphans --pull always

          docker compose ps
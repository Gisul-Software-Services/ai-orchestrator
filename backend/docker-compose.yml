version: '3.8'

services:
  qwen-model:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    image: qwen-api
    container_name: qwen-model
    env_file:
      - ./.env
    expose:
      - "9000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

services:
  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile.mac
    environment:
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
    # Mac / CPU: no NVIDIA runtime
    runtime: null


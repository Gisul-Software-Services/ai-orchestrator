version: '3.8'

services:

  model-service:

    image: aaptor/model-service:latest

    container_name: aaptor-model-service

    env_file:
      - ./model-service/.env

    ports:

      - '7001:7001'

    volumes:

      - ~/.cache/huggingface:/root/.cache/huggingface
      - /mnt/c/Users/adity/documents/gisul/gisul_model/assets:/app/assets

    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

    restart: unless-stopped

  backend-api:
    image: aaptor/backend-api:latest
    container_name: aaptor-backend-api

    env_file:
      - ./backend/api_gateway/.env

    ports:
      - '7000:7000'
    depends_on:
      - model-service
    restart: unless-stopped

  qwen-frontend:

    image: aaptor/qwen-frontend:latest

    container_name: aaptor-qwen-frontend

    env_file:
      - ./frontend/web/.env.local

    ports:

      - '7002:7002'

    environment:

      - API_BASE=http://backend-api:7000/api/v1

    depends_on:

      - backend-api

    restart: unless-stopped


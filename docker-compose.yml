services:

  redis:
    image: redis:7-alpine
    container_name: gisul-redis
    ports:
      - "6379:6379"
    networks:
      - gisul-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile
    image: gisul/model-service:${IMAGE_TAG:-latest}
    container_name: aaptor-model-service
    env_file:
      - ./model-service/.env
    ports:
      - "7001:7001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./assets:/app/assets
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - gisul-network
    restart: unless-stopped

  backend-api:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    image: gisul/backend-api:${IMAGE_TAG:-latest}
    container_name: aaptor-backend-api
    env_file:
      - ./backend/gateway/.env
    ports:
      - "7000:7000"
    depends_on:
      model-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - gisul-network
    restart: unless-stopped

  frontend:
    image: gisul/model-frontend:${IMAGE_TAG:-latest}
    container_name: gisul-frontend
    ports:
      - "7002:7002"
    environment:
      - NODE_ENV=production
      - GATEWAY_BASE_URL=http://backend-api:7000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - gisul-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:7002/login',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gisul-network:
    driver: bridge
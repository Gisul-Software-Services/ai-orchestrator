version: '3.8'

services:
  qwen-frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    image: aaptor/qwen-frontend:latest
    container_name: aaptor-qwen-frontend
    ports:
      - "7002:7002"
    environment:
      - NEXT_PUBLIC_API_BASE=http://host.docker.internal:7000
    restart: unless-stopped
